{{- if .Values.grafanaDashboard.enabled -}}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "hello-world.fullname" . }}-dashboard
  labels:
    {{- include "hello-world.labels" . | nindent 4 }}
    grafana_dashboard: "1"
data:
  hello-world-dashboard.json: |-
{{ .Files.Get "dashboards/hello-world-dashboard.json" | indent 4 }}
{{- end }}
